<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Ingest Server Upload</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 820px;
      margin: 40px auto;
      padding: 0 16px;
      line-height: 1.5;
    }
    .card {
      border: 1px solid #ccc;
      border-radius: 10px;
      padding: 20px;
    }
    .drop-zone {
      border: 2px dashed #888;
      border-radius: 10px;
      padding: 30px;
      text-align: center;
      margin-bottom: 16px;
      background: #fafafa;
    }
    .drop-zone.dragover {
      background: #eef6ff;
      border-color: #2b6cb0;
    }
    .row {
      margin-bottom: 14px;
    }
    label {
      display: block;
      font-weight: 600;
      margin-bottom: 6px;
    }
    input[type="text"], input[type="file"] {
      width: 100%;
      padding: 10px;
      box-sizing: border-box;
    }
    button {
      padding: 12px 18px;
      font-size: 16px;
      cursor: pointer;
    }
    pre {
      background: #111;
      color: #eee;
      padding: 14px;
      border-radius: 8px;
      overflow-x: auto;
      white-space: pre-wrap;
    }
    .small {
      color: #666;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <h1>Ingest Server</h1>
  <p>Upload one or more JSON files. Files will be renamed and written directly to MongoDB.</p>

  <div class="card">
    <form id="uploadForm">
      <div id="dropZone" class="drop-zone">
        <p><strong>Drop JSON files here</strong> or click below to select.</p>
        <input id="files" name="files" type="file" accept=".json,application/json" multiple />
      </div>

      <div class="row">
        <label for="collector_code">Collector Code</label>
        <input id="collector_code" name="collector_code" type="text" maxlength="2" required />
        <div class="small">Exactly 2 alphanumeric characters.</div>
      </div>

      <div class="row">
        <label for="organization_code">Organization Code</label>
        <input id="organization_code" name="organization_code" type="text" maxlength="5" required />
        <div class="small">Exactly 5 alphanumeric characters.</div>
      </div>

      <button type="submit">Submit</button>
    </form>
  </div>

  <h2>Response</h2>
  <pre id="output">Waiting for upload...</pre>

  <script>
    const form = document.getElementById("uploadForm");
    const fileInput = document.getElementById("files");
    const dropZone = document.getElementById("dropZone");
    const output = document.getElementById("output");

    ["dragenter", "dragover"].forEach(eventName => {
      dropZone.addEventListener(eventName, e => {
        e.preventDefault();
        e.stopPropagation();
        dropZone.classList.add("dragover");
      });
    });

    ["dragleave", "drop"].forEach(eventName => {
      dropZone.addEventListener(eventName, e => {
        e.preventDefault();
        e.stopPropagation();
        dropZone.classList.remove("dragover");
      });
    });

    dropZone.addEventListener("drop", e => {
      fileInput.files = e.dataTransfer.files;
    });

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const formData = new FormData();
      const collectorCode = document.getElementById("collector_code").value;
      const organizationCode = document.getElementById("organization_code").value;

      formData.append("collector_code", collectorCode);
      formData.append("organization_code", organizationCode);

      for (const file of fileInput.files) {
        formData.append("files", file);
      }

      output.textContent = "Uploading...";

      try {
        const response = await fetch("/api/upload", {
          method: "POST",
          body: formData
        });

        const contentType = response.headers.get("content-type") || "";
        if (contentType.includes("application/json")) {
          const data = await response.json();
          output.textContent = JSON.stringify(data, null, 2);
        } else {
          const text = await response.text();
          output.textContent = JSON.stringify({
            status: response.status,
            error: "Server returned a non-JSON response",
            body: text
          }, null, 2);
        }
      } catch (err) {
        output.textContent = JSON.stringify({
          error: String(err)
        }, null, 2);
      }
    });
  </script>
</body>
</html>
