<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">DataNaviGatr2 logo</title>
  <desc id="desc">A simple logo with a stylized compass and data bars for DataNaviGatr2.</desc>

  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1D4ED8"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22C55E"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
  </defs>
<!-- Outer mark -->
  <circle cx="256" cy="210" r="112" fill="none" stroke="url(#grad)" stroke-width="24"/>

  <!-- Data bars -->
  <rect x="170" y="258" width="32" height="86" rx="10" fill="url(#grad)"/>
  <rect x="220" y="228" width="32" height="116" rx="10" fill="url(#grad)"/>
  <rect x="270" y="198" width="32" height="146" rx="10" fill="url(#grad)"/>
  <rect x="320" y="244" width="32" height="100" rx="10" fill="url(#grad)"/>

  <!-- Compass needle -->
  <path d="M308 122 L344 168 L275 192 Z" fill="url(#accent)"/>
  <circle cx="256" cy="210" r="16" fill="#0F172A"/>

  <!-- Wordmark -->
  <text x="256" y="420" text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-size="38" font-weight="700" fill="#0F172A"
        letter-spacing="0.5">DataNaviGatr2</text>
</svg>
